services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    volumes:
      - ${MUSIC_DIR}:/music:ro
      - navidrome-data:/data
    environment:
      ND_SCANSCHEDULE: "0"   # disable auto-scan; brainstream triggers it
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: /navidrome

  brainstream:
    image: ghcr.io/bigpie1367/brain-stream:latest
    container_name: brainstream
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - ${MUSIC_DIR}:/app/data/music
      - db-data:/app/db
    depends_on:
      - navidrome
    environment:
      - TZ=Asia/Seoul
      - LB_USERNAME=${LB_USERNAME}
      - LB_TOKEN=${LB_TOKEN}
      - NAVIDROME_USER=${NAVIDROME_USER}
      - NAVIDROME_PASSWORD=${NAVIDROME_PASSWORD}
      # - NAVIDROME_URL=http://navidrome:4533
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv6.conf.default.disable_ipv6: 1

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro  # GHCR 인증
    environment:
      - WATCHTOWER_POLL_INTERVAL=300      # 5분마다 신규 이미지 체크
      - WATCHTOWER_CLEANUP=true           # 오래된 이미지 자동 삭제
      - WATCHTOWER_INCLUDE_STOPPED=false
    command: brainstream  # brainstream 컨테이너만 모니터링

volumes:
  db-data:
  navidrome-data:
