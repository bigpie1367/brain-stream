  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
      padding-bottom: 90px; /* 하단 플레이어 공간 확보 */
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── 탭 네비게이션 ── */
    .tab-nav {
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      background: none;
      border: 1px solid #2d3147;
      border-radius: 6px;
      color: #718096;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 14px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      align-self: auto;
    }
    .tab-btn:hover { background: #1a1d27; border-color: #4a5568; color: #a0aec0; }
    .tab-btn.active {
      background: #1e3a5f;
      border-color: #4299e1;
      color: #63b3ed;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    a.btn-outline {
      font-size: 0.82rem;
      padding: 6px 14px;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #a0aec0;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    a.btn-outline:hover { border-color: #63b3ed; color: #63b3ed; }

    section {
      background: #1a1d27;
      border: 1px solid #2d3147;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 18px;
    }

    section h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
    .field label { font-size: 0.78rem; color: #718096; }

    input[type="text"] {
      background: #0f1117;
      border: 1px solid #2d3147;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #4299e1; }

    button {
      background: #2b6cb0;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 8px 20px;
      transition: background 0.15s;
      white-space: nowrap;
      align-self: flex-end;
    }
    button:hover { background: #3182ce; }
    button:disabled { background: #2d3148; color: #4a5568; cursor: not-allowed; }

    .btn-secondary {
      background: #2d3147;
      color: #a0aec0;
    }
    .btn-secondary:hover { background: #363b55; color: #e2e8f0; }

    #status-bar {
      margin-top: 14px;
      min-height: 28px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-idle     { background: #4a5568; }
    .dot-progress { background: #f6ad55; animation: pulse 1s infinite; }
    .dot-done     { background: #68d391; }
    .dot-failed   { background: #fc8181; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .lb-row { display: flex; align-items: center; gap: 12px; }

    /* Downloads table */
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }

    thead th {
      text-align: left;
      color: #718096;
      font-weight: 500;
      padding: 6px 10px;
      border-bottom: 1px solid #2d3147;
    }

    tbody tr { border-bottom: 1px solid #1e2235; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 8px 10px; color: #cbd5e0; vertical-align: top; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-done        { background: #1c4532; color: #68d391; }
    .badge-failed      { background: #3b1515; color: #fc8181; }
    .badge-pending     { background: #2d3147; color: #a0aec0; }
    .badge-downloading { background: #2a3a54; color: #63b3ed; }
    .badge-tagging     { background: #2d2a54; color: #b794f4; }
    .badge-scanning    { background: #2a3a54; color: #76e4f7; }
    .badge-manual      { background: #3a2d54; color: #d6bcfa; }
    .badge-lb          { background: #1a2a3a; color: #63b3ed; }

    #no-data {
      text-align: center;
      color: #4a5568;
      padding: 24px;
      display: none;
    }

    /* 삭제 버튼 */
    .btn-danger {
      background: none;
      border: 1px solid #4a2020;
      border-radius: 4px;
      color: #718096;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 2px 8px;
      white-space: nowrap;
      align-self: auto;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1.5;
    }
    .btn-danger:hover { background: #3b1515; border-color: #fc8181; color: #fc8181; }
    .btn-danger:disabled { background: none; border-color: #2d3147; color: #2d3147; cursor: not-allowed; }

    /* 확인 모달 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: #1a1d27;
      border: 1px solid #2d3147;
      border-radius: 10px;
      padding: 24px 28px;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
    }

    .modal-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 10px;
    }

    .modal-msg {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-modal-cancel {
      background: #2d3147;
      border: none;
      border-radius: 6px;
      color: #a0aec0;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 7px 16px;
      transition: background 0.12s, color 0.12s;
      align-self: auto;
    }
    .btn-modal-cancel:hover { background: #363b55; color: #e2e8f0; }

    .btn-modal-confirm {
      background: #7b2020;
      border: none;
      border-radius: 6px;
      color: #fca5a5;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 7px 16px;
      transition: background 0.12s, color 0.12s;
      align-self: auto;
    }
    .btn-modal-confirm:hover { background: #991b1b; color: #fecaca; }
    .btn-modal-confirm:disabled { background: #2d3148; color: #4a5568; cursor: not-allowed; }

    /* ── Library 탭 ── */
    .library-layout {
      display: flex;
      gap: 0;
      height: 520px;
      background: #1a1d27;
      border: 1px solid #2d3147;
      border-radius: 10px;
      overflow: hidden;
    }

    .artist-pane {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #2d3147;
      overflow-y: auto;
      background: #161820;
    }

    .pane-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2d3147;
    }

    .artist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.88rem;
      color: #cbd5e0;
      border-bottom: 1px solid #1e2235;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .artist-item:hover { background: #1e2235; color: #e2e8f0; }
    .artist-item.active {
      background: #1e3a5f;
      color: #63b3ed;
    }
    .artist-item .arrow {
      font-size: 0.7rem;
      color: #4a5568;
      flex-shrink: 0;
    }
    .artist-item.active .arrow { color: #63b3ed; }

    .album-pane {
      flex: 1;
      overflow-y: auto;
      background: #1a1d27;
    }

    .album-block { border-bottom: 1px solid #2d3147; }

    .album-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
    }
    .album-header:hover { background: #1e2235; }

    .album-cover {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      background: #2d3147;
      object-fit: cover;
      flex-shrink: 0;
    }

    .album-cover-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      background: #2d3147;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5568;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .album-info { flex: 1; min-width: 0; }
    .album-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-meta {
      font-size: 0.75rem;
      color: #718096;
      margin-top: 2px;
    }
    .album-chevron {
      font-size: 0.75rem;
      color: #4a5568;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .album-block.open .album-chevron { transform: rotate(90deg); }

    .album-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn-album-action {
      background: none;
      border: 1px solid #2d3147;
      border-radius: 4px;
      color: #718096;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 7px;
      white-space: nowrap;
      align-self: auto;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1.4;
    }
    .btn-album-action:hover { background: #2d3147; border-color: #4a5568; color: #e2e8f0; }

    .ctrl-btn.shuffle-active { color: #4ade80; }

    .track-list { display: none; padding: 0 0 8px 0; }
    .album-block.open .track-list { display: block; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 16px 7px 72px;
      font-size: 0.83rem;
      color: #a0aec0;
      transition: background 0.12s;
      cursor: default;
    }
    .track-item:hover { background: #1e2235; }
    .track-item.playing {
      background: #1a2d1a;
      color: #68d391;
    }

    .track-num {
      width: 22px;
      text-align: right;
      color: #4a5568;
      font-size: 0.78rem;
      flex-shrink: 0;
    }
    .track-item.playing .track-num { color: #68d391; }

    .track-title {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-duration {
      color: #4a5568;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    .btn-play {
      background: none;
      border: 1px solid #2d3147;
      border-radius: 50%;
      color: #718096;
      cursor: pointer;
      font-size: 0.7rem;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      align-self: auto;
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .btn-play:hover { background: #2d3147; border-color: #4a5568; color: #e2e8f0; }
    .btn-play:disabled { background: none; border-color: #1e2235; color: #2d3147; cursor: not-allowed; }
    .track-item.playing .btn-play {
      background: #1c4532;
      border-color: #68d391;
      color: #68d391;
    }

    /* 로딩 / 빈 상태 */
    .library-msg {
      text-align: center;
      color: #4a5568;
      padding: 40px 20px;
      font-size: 0.88rem;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #2d3147;
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 하단 고정 플레이어 ── */
    #player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: #12141f;
      border-top: 1px solid #2d3147;
      display: none;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      z-index: 100;
    }
    #player-bar.visible { display: flex; }

    .player-cover {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      background: #2d3147;
      object-fit: cover;
      flex-shrink: 0;
    }

    .player-cover-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      background: #2d3147;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5568;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .player-info {
      min-width: 0;
      flex-shrink: 0;
      width: 180px;
    }
    .player-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-artist {
      font-size: 0.75rem;
      color: #718096;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #718096;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.12s, background 0.12s;
      align-self: auto;
    }
    .ctrl-btn:hover { color: #e2e8f0; background: #1e2235; }
    .ctrl-btn:disabled { color: #2d3147; cursor: not-allowed; background: none; }

    .ctrl-btn-play {
      background: #2b6cb0;
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      align-self: auto;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .ctrl-btn-play:hover { background: #3182ce; }
    .ctrl-btn-play:disabled { background: #2d3148; color: #4a5568; cursor: not-allowed; }

    .player-progress {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .time-label {
      font-size: 0.72rem;
      color: #718096;
      white-space: nowrap;
      flex-shrink: 0;
    }

    input[type="range"].seek-bar {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      background: #2d3147;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"].seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #63b3ed;
      cursor: pointer;
    }
    input[type="range"].seek-bar::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #63b3ed;
      border: none;
      cursor: pointer;
    }

    /* ── 재매칭 버튼 ── */
    .rematch-btn {
      background: none;
      border: 1px solid #2d3147;
      border-radius: 4px;
      color: #718096;
      cursor: pointer;
      font-size: 0.68rem;
      padding: 2px 7px;
      white-space: nowrap;
      align-self: auto;
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1.5;
    }
    .rematch-btn:hover { background: #2d3147; border-color: #a78bfa; color: #a78bfa; }

    /* ── 재매칭 모달 ── */
    .rematch-modal-box {
      background: #1a1d27;
      border: 1px solid #2d3147;
      border-radius: 10px;
      padding: 24px 28px;
      width: 92%;
      max-width: 560px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .rematch-fields {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .rematch-fields .field { flex: 1; min-width: 140px; }

    .rematch-search-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .rematch-search-row .field { flex: 1; min-width: 140px; }

    .btn-rematch-search {
      background: #4a3f6b;
      border: none;
      border-radius: 6px;
      color: #d6bcfa;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 16px;
      min-width: 88px;
      white-space: nowrap;
      align-self: flex-end;
      transition: background 0.12s;
    }
    .btn-rematch-search:hover { background: #5a4d82; }
    .btn-rematch-search:disabled { background: #2d3148; color: #4a5568; cursor: not-allowed; }

    .rematch-candidates {
      flex: 1;
      overflow-y: auto;
      min-height: 80px;
      max-height: 320px;
      border: 1px solid #2d3147;
      border-radius: 6px;
      margin-bottom: 16px;
      background: #0f1117;
    }

    .rematch-placeholder {
      text-align: center;
      color: #4a5568;
      padding: 32px 20px;
      font-size: 0.85rem;
    }

    .rematch-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #1e2235;
      cursor: pointer;

    .rematch-card:hover { background: #1e2235; }
    .rematch-card.selected {
      background: #1e2a4a;
      outline: 2px solid #4299e1;
      outline-offset: -2px;
    }

    .rematch-thumb {
      width: 56px;
      height: 56px;
      border-radius: 4px;
      background: #2d3147;
      object-fit: cover;
      flex-shrink: 0;
    }
    .rematch-thumb-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 4px;
      background: #2d3147;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5568;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .rematch-card-info { flex: 1; min-width: 0; }
    .rematch-card-album {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rematch-card-artist {
      font-size: 0.78rem;
      color: #718096;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rematch-card-badges {
      margin-top: 5px;

      gap: 5px;
      flex-wrap: wrap;

    .badge-mb { background: #1a2a3a; color: #63b3ed; }
    .badge-source { font-size: 0.68rem; padding: 1px 6px; }

    .rematch-feedback {
      font-size: 0.82rem;
      min-height: 20px;
      margin-bottom: 10px;
    }
    .rematch-feedback.error { color: #fc8181; }
    .rematch-feedback.success { color: #68d391; }

    .btn-modal-apply {
      background: #2b4fa8;
      border: none;
      border-radius: 6px;
      color: #90cdf4;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 7px 16px;
      transition: background 0.12s, color 0.12s;

    }
    .btn-modal-apply:hover { background: #2b6cb0; color: #bee3f8; }
    .btn-modal-apply:disabled { background: #2d3148; color: #4a5568; cursor: not-allowed; }

    /* ── Downloads 확장 행 ── */
    tbody tr.history-row {
      cursor: pointer;
      transition: background 0.12s;
    }
    tbody tr.history-row:hover { background: #1e2235; }
    tbody tr.history-row.expanded { background: #1a2235; }

    tbody tr.expand-row td {
      padding: 0;
      border-bottom: 1px solid #2d3147;

    .expand-inner {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #141728;
      border-top: 1px solid #1e2235;
    }

    .expand-album-info {
      font-size: 0.83rem;
      color: #a0aec0;
    }

    .expand-album-label {
      color: #718096;
      margin-right: 4px;
    }

    .expand-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-expand-rematch {
      background: none;
      border: 1px solid #2d3147;
      border-radius: 4px;
      color: #718096;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 4px 10px;
      white-space: nowrap;
      align-self: auto;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1.5;
    }
    .btn-expand-rematch:hover { background: #2d3147; border-color: #a78bfa; color: #a78bfa; }

    .btn-expand-delete {
      background: none;
      border: 1px solid #4a2020;
      border-radius: 4px;
      color: #718096;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 4px 10px;
      white-space: nowrap;
      align-self: auto;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1.5;
    }
    .btn-expand-delete:hover { background: #3b1515; border-color: #fc8181; color: #fc8181; }
  </style>
</head>
<body>

<header>
  <h1>BrainStream</h1>
  <div class="header-right">
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('downloads')">Downloads</button>
      <button class="tab-btn" onclick="switchTab('library')">Library</button>
    </nav>
    <a class="btn-outline" href="#" onclick="event.preventDefault(); window.open('/navidrome/', '_blank');">Navidrome ↗</a>
  </div>
</header>

<!-- Downloads 탭 -->
<div class="tab-panel active" id="tab-downloads">

  <!-- Manual Download -->
  <section>
    <h2>수동 다운로드</h2>
    <div class="input-row">
      <div class="field">
        <label for="inp-artist">Artist</label>
        <input type="text" id="inp-artist" placeholder="Radiohead">
      </div>
      <div class="field">
        <label for="inp-track">Track</label>
        <input type="text" id="inp-track" placeholder="Creep">
      </div>
      <button id="btn-download" onclick="startDownload()">Download</button>
    </div>
    <div id="status-bar">
      <span class="status-dot dot-idle" id="status-dot"></span>
      <span id="status-msg">대기 중</span>
    </div>
  </section>

  <!-- LB Pipeline -->
  <section>
    <h2>ListenBrainz 파이프라인</h2>
    <div class="lb-row">
      <button class="btn-secondary" onclick="runPipeline()">Run LB Pipeline</button>
      <span id="lb-msg" style="font-size:0.83rem; color:#718096;"></span>
    </div>
  </section>

  <!-- Download History -->
  <section>
    <div class="table-header">
      <h2 style="margin-bottom:0">다운로드 이력</h2>
      <button class="btn-secondary" style="padding:5px 12px; font-size:0.8rem;" onclick="loadHistory()">Refresh</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Artist</th>
            <th>Track</th>
            <th>Source</th>
            <th>Status</th>
            <th>Time</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body">
        </tbody>
      </table>
      <p id="no-data">이력 없음</p>
    </div>
  </section>

</div><!-- /tab-downloads -->

<!-- Library 탭 -->
<div class="tab-panel" id="tab-library">
  <div class="library-layout">
    <!-- 왼쪽: 아티스트 목록 -->
    <div class="artist-pane" id="artist-pane">
      <div class="pane-header">Artists</div>
      <div id="artist-list">
        <div class="library-msg">
          <span class="loading-spinner"></span>불러오는 중...
        </div>
      </div>
    </div>
    <!-- 오른쪽: 앨범/트랙 목록 -->
    <div class="album-pane" id="album-pane">
      <div class="pane-header">Albums &amp; Tracks</div>
      <div id="album-list">
        <div class="library-msg">아티스트를 선택하세요.</div>
      </div>
    </div>
  </div>
</div><!-- /tab-library -->

<!-- 하단 고정 플레이어 -->
<div id="player-bar">
  <div id="player-cover-wrap">
    <div class="player-cover-placeholder" id="player-cover-placeholder">&#9835;</div>
    <img class="player-cover" id="player-cover" src="" alt="" style="display:none;">
  </div>
  <div class="player-info">
    <div class="player-title" id="player-title">-</div>
    <div class="player-artist" id="player-artist">-</div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()" title="셔플">&#8652;</button>
    <button class="ctrl-btn" id="btn-prev" onclick="playPrev()" title="이전 곡">&#9664;&#9664;</button>
    <button class="ctrl-btn-play" id="btn-play-pause" onclick="togglePlay()" title="재생/정지">&#9654;</button>
    <button class="ctrl-btn" id="btn-next" onclick="playNext()" title="다음 곡">&#9654;&#9654;</button>
  </div>
  <div class="player-progress">
    <span class="time-label" id="time-current">0:00</span>
    <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0" step="0.1">
    <span class="time-label" id="time-total">0:00</span>
  </div>
  <audio id="audio-player" preload="none"></audio>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay hidden" id="delete-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
  <div class="modal-box">
    <div class="modal-title" id="modal-title-text">트랙 삭제</div>
    <p class="modal-msg" id="modal-msg"></p>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="modal-cancel-btn" onclick="closeDeleteModal()">취소</button>
      <button class="btn-modal-confirm" id="modal-confirm-btn" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- 재매칭 모달 -->
<div class="modal-overlay hidden" id="rematch-modal" role="dialog" aria-modal="true" aria-labelledby="rematch-modal-title">
  <div class="rematch-modal-box">
    <div class="modal-title" id="rematch-modal-title" style="margin-bottom:16px;">앨범 재매칭</div>

    <div class="rematch-search-row">
      <div class="field">
        <label for="rematch-artist">아티스트</label>
        <input type="text" id="rematch-artist" placeholder="아티스트명">
      </div>
      <div class="field">
        <label for="rematch-track">트랙명</label>
        <input type="text" id="rematch-track" placeholder="트랙명">
      </div>
      <button class="btn-rematch-search" id="rematch-search-btn" onclick="searchRematch()">검색</button>
    </div>

    <div class="rematch-candidates" id="rematch-candidates">
      <div class="rematch-placeholder">아티스트와 트랙명을 입력 후 검색하세요.</div>
    </div>

    <div class="rematch-feedback" id="rematch-feedback"></div>

    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeRematchModal()">취소</button>
      <button class="btn-modal-apply" id="rematch-apply-btn" onclick="applyRematch()">적용</button>
    </div>
  </div>
</div>

<script>
  // ── 탭 네비게이션 ────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.textContent.toLowerCase().includes(name === 'downloads' ? 'download' : 'library')) {
        b.classList.add('active');
      }
    });
    if (name === 'library' && !libraryLoaded) {
      loadArtists();
    }
  }

  // ── Status bar ─────────────────────────────────────────────────────────────
  const dotEl  = document.getElementById('status-dot');
  const msgEl  = document.getElementById('status-msg');
  const dlBtn  = document.getElementById('btn-download');

  function setStatus(type, msg) {
    dotEl.className = 'status-dot dot-' + type;
    msgEl.textContent = msg;
  }

  // ── Manual Download ────────────────────────────────────────────────────────
  let isDownloading = false;

  async function startDownload() {
    // 재진입 방지: 이미 진행 중이면 즉시 반환
    if (isDownloading || dlBtn.disabled) return;

    const artist = document.getElementById('inp-artist').value.trim();
    const track  = document.getElementById('inp-track').value.trim();
    if (!artist || !track) { alert('Artist와 Track을 입력하세요.'); return; }

    isDownloading = true;
    dlBtn.disabled = true;
    setStatus('progress', '요청 중...');

    let jobId;
    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ artist, track }),
      });
      if (!res.ok) throw new Error(await res.text());
      ({ job_id: jobId } = await res.json());
    } catch (e) {
      setStatus('failed', '요청 실패: ' + e.message);
      isDownloading = false;
      dlBtn.disabled = false;
      return;
    }

    // SSE
    const es = new EventSource('/api/sse/' + jobId);
    es.onmessage = (e) => {
      const { status, message } = JSON.parse(e.data);
      const dotType = (status === 'done') ? 'done' : (status === 'failed') ? 'failed' : 'progress';
      setStatus(dotType, message);

      if (status === 'done' || status === 'failed') {
        es.close();
        isDownloading = false;
        dlBtn.disabled = false;
        loadHistory();
      }
    };
    es.onerror = () => {
      setStatus('failed', 'SSE 연결 오류');
      es.close();
      isDownloading = false;
      dlBtn.disabled = false;
    };
  }

  // Enter key submits (preventDefault: 브라우저가 button에 암묵적 클릭 보내는 것 차단)
  ['inp-artist', 'inp-track'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); startDownload(); }
    });
  });

  // ── LB Pipeline ────────────────────────────────────────────────────────────
  async function runPipeline() {
    const lbMsg = document.getElementById('lb-msg');
    lbMsg.textContent = '실행 중...';
    try {
      const res = await fetch('/api/pipeline/run', { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      lbMsg.textContent = '파이프라인 시작됨 ✓';
    } catch (e) {
      lbMsg.textContent = '오류: ' + e.message;
    }
    setTimeout(() => { lbMsg.textContent = ''; }, 5000);
  }

  // ── History ────────────────────────────────────────────────────────────────
  function relativeTime(isoStr) {
    if (!isoStr) return '—';
    const diff = Math.floor((Date.now() - new Date(isoStr + 'Z')) / 1000);
    if (diff < 60)   return diff + '초 전';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    return Math.floor(diff / 86400) + '일 전';
  }

  function statusBadge(status) {
    const map = {
      done: '● done', failed: '✕ failed', pending: '○ pending',
      downloading: '↓ downloading', tagging: '⊙ tagging', scanning: '⟳ scanning',
    };
    const label = map[status] || status;
    return `<span class="badge badge-${esc(status)}">${esc(label)}</span>`;
  }

  function sourceBadge(src) {
    if (!src) return '';
    const cls = (src === 'manual') ? 'badge-manual' : 'badge-lb';
    return `<span class="badge ${esc(cls)}">${esc(src)}</span>`;
  }

  // ── Downloads 아코디언 상태 ────────────────────────────────────────────────
  // 현재 펼쳐진 행의 mbid (없으면 null)
  let _expandedMbid = null;

  async function loadHistory() {
    try {
      const res = await fetch('/api/downloads');
      const rows = await res.json();
      const tbody = document.getElementById('history-body');
      const noData = document.getElementById('no-data');

      if (!rows.length) {
        tbody.innerHTML = '';
        noData.style.display = 'block';
        _expandedMbid = null;
        return;
      }
      noData.style.display = 'none';
      tbody.innerHTML = '';

      rows.forEach(r => {
        const isExpandable = r.status !== 'pending' && r.status !== 'downloading';

        const tr = document.createElement('tr');
        tr.dataset.mbid = r.mbid;
        tr.className = 'history-row';

        const tdArtist = document.createElement('td');
        tdArtist.textContent = r.artist;

        const tdTrack = document.createElement('td');
        tdTrack.textContent = r.track_name;

        const tdSource = document.createElement('td');
        tdSource.innerHTML = sourceBadge(r.source);

        const tdStatus = document.createElement('td');
        tdStatus.innerHTML = statusBadge(r.status);

        const tdTime = document.createElement('td');
        tdTime.style.color = '#718096';
        tdTime.textContent = relativeTime(r.downloaded_at);

        // 액션 열 (빈 셀 — 확장 영역에 버튼 이동)
        const tdAction = document.createElement('td');

        tr.appendChild(tdArtist);
        tr.appendChild(tdTrack);
        tr.appendChild(tdSource);
        tr.appendChild(tdStatus);
        tr.appendChild(tdTime);
        tr.appendChild(tdAction);
        tbody.appendChild(tr);

        // 확장 행 (기본 숨김)
        const expandTr = document.createElement('tr');
        expandTr.className = 'expand-row';
        expandTr.style.display = 'none';

        const expandTd = document.createElement('td');
        expandTd.colSpan = 6;
        expandTr.appendChild(expandTd);
        tbody.appendChild(expandTr);

        // 이전에 펼쳐져 있던 행이면 즉시 복원
        if (_expandedMbid === r.mbid && isExpandable) {
          tr.classList.add('expanded');
          expandTr.style.display = '';
          renderExpandInner(expandTd, r, expandTr, tr, true /* cached */);
        }

        if (!isExpandable) return;

        // 행 클릭 → 아코디언 토글
        tr.addEventListener('click', (e) => {
          e.stopPropagation();
          const isOpen = tr.classList.contains('expanded');

          // 먼저 모든 확장 행 닫기
          collapseAllExpandRows();

          if (!isOpen) {
            // 이 행 열기
            tr.classList.add('expanded');
            expandTr.style.display = '';
            _expandedMbid = r.mbid;
            renderExpandInner(expandTd, r, expandTr, tr, false /* fresh load */);
          } else {
            _expandedMbid = null;
          }
        });
      });
    } catch (e) {
      console.error('history load failed', e);
    }
  }

  function collapseAllExpandRows() {
    document.querySelectorAll('#history-body .history-row.expanded').forEach(el => {
      el.classList.remove('expanded');
    });
    document.querySelectorAll('#history-body .expand-row').forEach(el => {
      el.style.display = 'none';
    });
  }

  function renderExpandInner(expandTd, r, expandTr, mainTr, useCached) {
    const inner = document.createElement('div');
    inner.className = 'expand-inner';

    // 앨범 정보 영역
    const albumInfo = document.createElement('div');
    albumInfo.className = 'expand-album-info';

    const labelSpan = document.createElement('span');
    labelSpan.className = 'expand-album-label';
    labelSpan.textContent = '앨범:';

    const albumText = document.createElement('span');
    albumText.className = 'expand-album-value';
    albumText.textContent = '앨범 정보 불러오는 중...';

    albumInfo.appendChild(labelSpan);
    albumInfo.appendChild(albumText);

    // 버튼 영역
    const actions = document.createElement('div');
    actions.className = 'expand-actions';

    const rematchBtn = document.createElement('button');
    rematchBtn.className = 'btn-expand-rematch';
    rematchBtn.textContent = '재매칭';
    rematchBtn.title = '앨범 재매칭';
    rematchBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openRematchModalForDownload(r.mbid, r.artist, r.track_name);
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn-expand-delete';
    deleteBtn.textContent = '삭제';
    deleteBtn.title = '이 항목을 이력에서 삭제합니다';
    deleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDeleteModal(r.mbid, r.artist, r.track_name, mainTr, expandTr);
    });

    actions.appendChild(rematchBtn);
    actions.appendChild(deleteBtn);

    inner.appendChild(albumInfo);
    inner.appendChild(actions);
    expandTd.innerHTML = '';
    expandTd.appendChild(inner);

    // 앨범 정보 lazy load
    loadDownloadDetail(r.mbid, albumText);
  }

  async function loadDownloadDetail(mbid, albumTextEl) {
    try {
      const res = await fetch('/api/downloads/' + encodeURIComponent(mbid) + '/detail');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      albumTextEl.textContent = data.album_name || '앨범 정보 없음';
    } catch (e) {
      albumTextEl.textContent = '앨범 정보 없음';
    }
  }

  // ── 삭제 모달 ──────────────────────────────────────────────────────────────
  let _pendingDeleteMbid = null;
  let _pendingDeleteRow  = null;
  let _pendingDeleteExpandRow = null;

  function openDeleteModal(mbid, artist, trackName, rowEl, expandRowEl) {
    _pendingDeleteMbid = mbid;
    _pendingDeleteRow  = rowEl;
    _pendingDeleteExpandRow = expandRowEl ?? null;

    const msgEl = document.getElementById('modal-msg');
    // textContent로 삽입해 XSS 방지
    msgEl.textContent = '';
    const strong = document.createElement('strong');
    strong.textContent = artist + ' - ' + trackName;
    msgEl.appendChild(document.createTextNode(''));
    msgEl.appendChild(strong);
    msgEl.appendChild(document.createTextNode('을(를) 이력에서 삭제하시겠습니까?'));

    const confirmBtn = document.getElementById('modal-confirm-btn');
    confirmBtn.disabled = false;
    confirmBtn.textContent = '삭제';

    document.getElementById('delete-modal').classList.remove('hidden');
  }

  function closeDeleteModal() {
    document.getElementById('delete-modal').classList.add('hidden');
    _pendingDeleteMbid = null;
    _pendingDeleteRow  = null;
    _pendingDeleteExpandRow = null;
  }

  async function confirmDelete() {
    if (!_pendingDeleteMbid) return;

    const confirmBtn = document.getElementById('modal-confirm-btn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = '삭제 중...';

    try {
      const res = await fetch('/api/downloads/' + encodeURIComponent(_pendingDeleteMbid), {
        method: 'DELETE',
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || 'HTTP ' + res.status);
      }

      // 성공: 해당 행과 확장 행을 DOM에서 제거
      if (_pendingDeleteExpandRow && _pendingDeleteExpandRow.parentNode) {
        _pendingDeleteExpandRow.parentNode.removeChild(_pendingDeleteExpandRow);
      }
      if (_pendingDeleteRow && _pendingDeleteRow.parentNode) {
        _pendingDeleteRow.parentNode.removeChild(_pendingDeleteRow);
      }

      // 삭제한 항목이 펼쳐져 있었으면 _expandedMbid 초기화
      if (_expandedMbid === _pendingDeleteMbid) {
        _expandedMbid = null;
      }

      // 남은 행이 없으면 "이력 없음" 표시
      const tbody = document.getElementById('history-body');
      const remainingRows = tbody.querySelectorAll('tr.history-row');
      if (!remainingRows.length) {
        document.getElementById('no-data').style.display = 'block';
      }

      closeDeleteModal();
    } catch (e) {
      confirmBtn.disabled = false;
      confirmBtn.textContent = '삭제';
      // 모달은 열어둔 채로 에러 메시지 표시
      const msgEl = document.getElementById('modal-msg');
      const errSpan = document.createElement('span');
      errSpan.style.color = '#fc8181';
      errSpan.style.display = 'block';
      errSpan.style.marginTop = '8px';
      errSpan.style.fontSize = '0.8rem';
      errSpan.textContent = '삭제 실패: ' + e.message;
      // 이전 에러 메시지가 있으면 교체
      const prevErr = msgEl.querySelector('.delete-err');
      if (prevErr) prevErr.remove();
      errSpan.className = 'delete-err';
      msgEl.appendChild(errSpan);
    }
  }

  // 모달 외부(오버레이) 클릭 시 닫기
  document.getElementById('delete-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
  });

  // ESC 키로 모달 닫기
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeDeleteModal();
      closeRematchModal();
    }
  });

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Initial load + auto-refresh every 5 s
  // 삭제/재매칭 모달이 열려 있는 동안은 자동 갱신을 건너뛰어 참조 보호
  loadHistory();
  setInterval(() => {
    const deleteModalOpen = !document.getElementById('delete-modal').classList.contains('hidden');
    const rematchModalOpen = !document.getElementById('rematch-modal').classList.contains('hidden');
    if (!deleteModalOpen && !rematchModalOpen) loadHistory();
  }, 5000);

  // ── Library ────────────────────────────────────────────────────────────────
  let libraryLoaded = false;
  let selectedArtistId = null;
  // 현재 열려 있는 앨범 ID 집합
  const openAlbums = new Set();
  // 앨범별 트랙 캐시 { albumId: [song, ...] }
  const albumCache = {};

  async function loadArtists() {
    const listEl = document.getElementById('artist-list');
    listEl.innerHTML = '<div class="library-msg"><span class="loading-spinner"></span>불러오는 중...</div>';
    try {
      const res = await fetch('/api/subsonic/getArtists?f=json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const indexes = data['subsonic-response']?.artists?.index ?? [];
      const artists = indexes.flatMap(idx => idx.artist ?? []);

      if (!artists.length) {
        listEl.innerHTML = '<div class="library-msg">아티스트 없음</div>';
        return;
      }

      listEl.innerHTML = '';
      artists.forEach(artist => {
        const div = document.createElement('div');
        div.className = 'artist-item';
        div.dataset.id = artist.id;

        const nameSpan = document.createElement('span');
        nameSpan.textContent = artist.name;

        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '›';

        div.appendChild(nameSpan);
        div.appendChild(arrow);

        div.addEventListener('click', () => selectArtist(artist.id, artist.name, div));
        listEl.appendChild(div);
      });

      libraryLoaded = true;
    } catch (e) {
      listEl.innerHTML = '<div class="library-msg">불러오기 실패: ' + esc(e.message) + '</div>';
    }
  }

  async function selectArtist(artistId, artistName, itemEl) {
    // 이전 선택 해제
    document.querySelectorAll('.artist-item').forEach(el => el.classList.remove('active'));
    itemEl.classList.add('active');
    selectedArtistId = artistId;

    const albumListEl = document.getElementById('album-list');
    albumListEl.innerHTML = '<div class="library-msg"><span class="loading-spinner"></span>불러오는 중...</div>';

    try {
      const res = await fetch('/api/subsonic/getArtist?id=' + encodeURIComponent(artistId) + '&f=json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const albums = data['subsonic-response']?.artist?.album ?? [];

      if (!albums.length) {
        albumListEl.innerHTML = '<div class="library-msg">앨범 없음</div>';
        return;
      }

      albumListEl.innerHTML = '';
      // 연도 기준 정렬 (없으면 뒤로)
      albums.sort((a, b) => (a.year || 9999) - (b.year || 9999));

      albums.forEach(album => {
        const block = buildAlbumBlock(album, artistName);
        albumListEl.appendChild(block);
        // 이전에 열려 있던 앨범은 다시 열기
        if (openAlbums.has(album.id)) {
          block.classList.add('open');
          if (albumCache[album.id]) {
            renderTracks(block, albumCache[album.id]);
          } else {
            loadTracks(block, album.id);
          }
        }
      });
    } catch (e) {
      albumListEl.innerHTML = '<div class="library-msg">불러오기 실패: ' + esc(e.message) + '</div>';
    }
  }

  function buildAlbumBlock(album, artistName) {
    const block = document.createElement('div');
    block.className = 'album-block';
    block.dataset.albumId = album.id;

    const header = document.createElement('div');
    header.className = 'album-header';

    // 커버 이미지
    const img = document.createElement('img');
    img.className = 'album-cover';
    img.alt = '';
    img.src = '/api/subsonic/getCoverArt?id=' + encodeURIComponent(album.id) + '&size=200';
    img.onerror = function() {
      this.style.display = 'none';
      placeholder.style.display = 'flex';
    };
    const placeholder = document.createElement('div');
    placeholder.className = 'album-cover-placeholder';
    placeholder.style.display = 'none';
    placeholder.textContent = '\u266B';

    const info = document.createElement('div');
    info.className = 'album-info';

    const nameDiv = document.createElement('div');
    nameDiv.className = 'album-name';
    nameDiv.textContent = album.name;

    const metaDiv = document.createElement('div');
    metaDiv.className = 'album-meta';
    const parts = [];
    if (album.year) parts.push(album.year);
    if (album.songCount) parts.push(album.songCount + '곡');
    metaDiv.textContent = parts.join(' · ');

    info.appendChild(nameDiv);
    info.appendChild(metaDiv);

    const chevron = document.createElement('span');
    chevron.className = 'album-chevron';
    chevron.textContent = '›';

    // 전체 재생 / 셔플 재생 버튼
    const actions = document.createElement('div');
    actions.className = 'album-header-actions';

    const btnPlay = document.createElement('button');
    btnPlay.className = 'btn-album-action';
    btnPlay.textContent = '\u25B6 전체 재생';
    btnPlay.title = '앨범 전체 재생';
    btnPlay.addEventListener('click', (e) => {
      e.stopPropagation();
      playAlbum(album.id, false);
    });

    const btnShuffle = document.createElement('button');
    btnShuffle.className = 'btn-album-action';
    btnShuffle.textContent = '\u21C4 셔플';
    btnShuffle.title = '앨범 셔플 재생';
    btnShuffle.addEventListener('click', (e) => {
      e.stopPropagation();
      playAlbum(album.id, true);
    });

    actions.appendChild(btnPlay);
    actions.appendChild(btnShuffle);

    header.appendChild(img);
    header.appendChild(placeholder);
    header.appendChild(info);
    header.appendChild(actions);
    header.appendChild(chevron);

    const trackListEl = document.createElement('div');
    trackListEl.className = 'track-list';

    header.addEventListener('click', () => toggleAlbum(block, album.id, trackListEl));

    block.appendChild(header);
    block.appendChild(trackListEl);
    return block;
  }

  function toggleAlbum(block, albumId, trackListEl) {
    const isOpen = block.classList.contains('open');
    if (isOpen) {
      block.classList.remove('open');
      openAlbums.delete(albumId);
    } else {
      block.classList.add('open');
      openAlbums.add(albumId);
      if (albumCache[albumId]) {
        renderTracks(block, albumCache[albumId]);
      } else {
        trackListEl.innerHTML = '<div class="library-msg"><span class="loading-spinner"></span>불러오는 중...</div>';
        loadTracks(block, albumId);
      }
    }
  }

  async function loadTracks(block, albumId) {
    const trackListEl = block.querySelector('.track-list');
    try {
      const res = await fetch('/api/subsonic/getAlbum?id=' + encodeURIComponent(albumId) + '&f=json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const songs = data['subsonic-response']?.album?.song ?? [];
      albumCache[albumId] = songs;
      renderTracks(block, songs);
    } catch (e) {
      trackListEl.innerHTML = '<div class="library-msg">트랙 불러오기 실패: ' + esc(e.message) + '</div>';
    }
  }

  function renderTracks(block, songs) {
    const trackListEl = block.querySelector('.track-list');
    trackListEl.innerHTML = '';

    if (!songs.length) {
      trackListEl.innerHTML = '<div class="library-msg">트랙 없음</div>';
      return;
    }

    // track 번호 기준 정렬
    const sorted = [...songs].sort((a, b) => (a.track || 0) - (b.track || 0));

    sorted.forEach(song => {
      const item = document.createElement('div');
      item.className = 'track-item';
      item.dataset.songId = song.id;
      if (currentSongId === song.id) item.classList.add('playing');

      const numSpan = document.createElement('span');
      numSpan.className = 'track-num';
      numSpan.textContent = song.track ? String(song.track).padStart(2, '0') : '—';

      const titleSpan = document.createElement('span');
      titleSpan.className = 'track-title';
      titleSpan.textContent = song.title ?? '';

      const durSpan = document.createElement('span');
      durSpan.className = 'track-duration';
      durSpan.textContent = song.duration ? formatTime(song.duration) : '';

      const playBtn = document.createElement('button');
      playBtn.className = 'btn-play';
      playBtn.title = '재생';
      // 현재 재생 중이면 ■ 아이콘, 아니면 ▶
      playBtn.innerHTML = (currentSongId === song.id) ? '&#9646;&#9646;' : '&#9654;';
      playBtn.addEventListener('click', () => {
        playSong(song);
      });

      const rematchBtn = document.createElement('button');
      rematchBtn.className = 'rematch-btn';
      rematchBtn.title = '앨범 재매칭';
      rematchBtn.textContent = '재매칭';
      rematchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openRematchModal(song.id, song.artist ?? '', song.title ?? '');
      });

      item.appendChild(numSpan);
      item.appendChild(titleSpan);
      item.appendChild(durSpan);
      item.appendChild(playBtn);
      item.appendChild(rematchBtn);
      trackListEl.appendChild(item);
    });

    // 현재 앨범의 플레이리스트 업데이트
    updatePlaylistForAlbum(block, sorted);
  }

  // ── 플레이어 ───────────────────────────────────────────────────────────────
  const audio = document.getElementById('audio-player');
  const playerBar = document.getElementById('player-bar');
  const btnPlayPause = document.getElementById('btn-play-pause');
  const seekBar = document.getElementById('seek-bar');
  const timeCurrent = document.getElementById('time-current');
  const timeTotal = document.getElementById('time-total');
  const playerTitle = document.getElementById('player-title');
  const playerArtist = document.getElementById('player-artist');
  const playerCover = document.getElementById('player-cover');
  const playerCoverPlaceholder = document.getElementById('player-cover-placeholder');

  let currentSongId = null;
  let currentPlaylist = [];  // { id, title, artist, albumId } 배열
  let currentPlaylistIdx = -1;
  let isSeeking = false;
  let shuffleMode = false;

  function updatePlaylistForAlbum(block, songs) {
    // 현재 재생 중인 곡이 이 앨범에 있으면 플레이리스트 갱신
    if (songs.some(s => s.id === currentSongId)) {
      setPlaylistFromSongs(songs);
      currentPlaylistIdx = currentPlaylist.findIndex(s => s.id === currentSongId);
    }
  }

  function setPlaylistFromSongs(songs) {
    currentPlaylist = songs.map(s => ({
      id: s.id,
      title: s.title ?? '',
      artist: s.artist ?? '',
      albumId: s.albumId ?? s.parent ?? null,
      duration: s.duration ?? 0,
    }));
  }

  function playSong(song) {
    // 앨범 내 트랙 목록을 플레이리스트로 설정
    const block = document.querySelector(`.album-block[data-album-id="${song.albumId ?? song.parent}"]`);
    if (block && albumCache[song.albumId ?? song.parent]) {
      const sorted = [...albumCache[song.albumId ?? song.parent]]
        .sort((a, b) => (a.track || 0) - (b.track || 0));
      setPlaylistFromSongs(sorted);
      currentPlaylistIdx = currentPlaylist.findIndex(s => s.id === song.id);
    } else {
      // 앨범 캐시가 없으면 단일 곡 플레이리스트
      currentPlaylist = [{
        id: song.id,
        title: song.title ?? '',
        artist: song.artist ?? '',
        albumId: song.albumId ?? song.parent ?? null,
        duration: song.duration ?? 0,
      }];
      currentPlaylistIdx = 0;
    }

    loadAndPlayIdx(currentPlaylistIdx);
  }

  function loadAndPlayIdx(idx) {
    if (idx < 0 || idx >= currentPlaylist.length) return;
    currentPlaylistIdx = idx;
    const song = currentPlaylist[idx];
    currentSongId = song.id;

    // 오디오 소스 설정
    audio.src = '/api/subsonic/stream?id=' + encodeURIComponent(song.id);
    audio.load();
    audio.play().catch(err => console.error('play failed:', err));

    // 플레이어 UI 갱신
    playerTitle.textContent = song.title;
    playerArtist.textContent = song.artist;
    btnPlayPause.innerHTML = '&#9646;&#9646;'; // 정지 아이콘

    // 커버아트
    if (song.albumId) {
      const coverSrc = '/api/subsonic/getCoverArt?id=' + encodeURIComponent(song.albumId) + '&size=200';
      playerCover.src = coverSrc;
      playerCover.style.display = 'block';
      playerCoverPlaceholder.style.display = 'none';
      playerCover.onerror = function() {
        this.style.display = 'none';
        playerCoverPlaceholder.style.display = 'flex';
      };
    } else {
      playerCover.style.display = 'none';
      playerCoverPlaceholder.style.display = 'flex';
    }

    // 시크바 초기화
    seekBar.value = 0;
    timeCurrent.textContent = '0:00';
    timeTotal.textContent = song.duration ? formatTime(song.duration) : '0:00';

    // 플레이어 바 표시
    playerBar.classList.add('visible');

    // 트랙 목록 UI 갱신 (재생 중 강조)
    refreshTrackHighlight();
  }

  function refreshTrackHighlight() {
    document.querySelectorAll('.track-item').forEach(el => {
      const isPlaying = el.dataset.songId === currentSongId;
      el.classList.toggle('playing', isPlaying);
      const btn = el.querySelector('.btn-play');
      if (btn) btn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
    });
  }

  function togglePlay() {
    if (!currentSongId) return;
    if (audio.paused) {
      audio.play().catch(err => console.error('play failed:', err));
    } else {
      audio.pause();
    }
  }

  function playPrev() {
    if (currentPlaylistIdx > 0) {
      loadAndPlayIdx(currentPlaylistIdx - 1);
    }
  }

  function randomIndexExcluding(length, excludeIdx) {
    if (length <= 1) return 0;
    let idx;
    do { idx = Math.floor(Math.random() * length); } while (idx === excludeIdx);
    return idx;
  }

  function toggleShuffle() {
    shuffleMode = !shuffleMode;
    const btn = document.getElementById('btn-shuffle');
    btn.classList.toggle('shuffle-active', shuffleMode);
    btn.title = shuffleMode ? '셔플 끄기' : '셔플';
  }

  async function playAlbum(albumId, shuffle) {
    // 캐시에 없으면 트랙 로드 후 재생
    if (!albumCache[albumId]) {
      // 블록을 찾아 로딩 상태 없이 직접 API 호출
      try {
        const res = await fetch('/api/subsonic/getAlbum?id=' + encodeURIComponent(albumId) + '&f=json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        albumCache[albumId] = data['subsonic-response']?.album?.song ?? [];
        // 블록이 열려 있으면 트랙 목록도 렌더링
        const block = document.querySelector('.album-block[data-album-id="' + albumId + '"]');
        if (block && block.classList.contains('open')) {
          renderTracks(block, albumCache[albumId]);
        }
      } catch (e) {
        console.error('playAlbum: 트랙 로드 실패', e);
        return;
      }
    }

    const songs = albumCache[albumId];
    if (!songs || !songs.length) return;

    const sorted = [...songs].sort((a, b) => (a.track || 0) - (b.track || 0));
    setPlaylistFromSongs(sorted);

    // 셔플이면 Fisher-Yates로 플레이리스트 섞기
    if (shuffle) {
      for (let i = currentPlaylist.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentPlaylist[i], currentPlaylist[j]] = [currentPlaylist[j], currentPlaylist[i]];
      }
    }

    currentPlaylistIdx = 0;
    loadAndPlayIdx(0);
  }

  function playNext() {
    if (shuffleMode) {
      if (currentPlaylist.length === 0) return;
      const nextIdx = randomIndexExcluding(currentPlaylist.length, currentPlaylistIdx);
      loadAndPlayIdx(nextIdx);
    } else {
      if (currentPlaylistIdx < currentPlaylist.length - 1) {
        loadAndPlayIdx(currentPlaylistIdx + 1);
      }
    }
  }

  // 재생/정지 상태 반영
  audio.addEventListener('play', () => {
    btnPlayPause.innerHTML = '&#9646;&#9646;';
  });
  audio.addEventListener('pause', () => {
    btnPlayPause.innerHTML = '&#9654;';
  });

  // 시간 업데이트
  audio.addEventListener('timeupdate', () => {
    if (isSeeking) return;
    if (audio.duration && isFinite(audio.duration)) {
      seekBar.value = (audio.currentTime / audio.duration) * 100;
    }
    timeCurrent.textContent = formatTime(Math.floor(audio.currentTime));
  });

  // 총 길이 로드 완료
  audio.addEventListener('loadedmetadata', () => {
    if (isFinite(audio.duration)) {
      timeTotal.textContent = formatTime(Math.floor(audio.duration));
    }
  });

  // 곡 종료 → 다음 곡
  audio.addEventListener('ended', () => {
    if (shuffleMode && currentPlaylist.length > 1) {
      loadAndPlayIdx(randomIndexExcluding(currentPlaylist.length, currentPlaylistIdx));
    } else if (currentPlaylistIdx < currentPlaylist.length - 1) {
      loadAndPlayIdx(currentPlaylistIdx + 1);
    } else {
      btnPlayPause.innerHTML = '&#9654;';
    }
  });

  // 시크바 조작
  seekBar.addEventListener('mousedown', () => { isSeeking = true; });
  seekBar.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });
  seekBar.addEventListener('input', () => {
    if (audio.duration && isFinite(audio.duration)) {
      timeCurrent.textContent = formatTime(Math.floor((seekBar.value / 100) * audio.duration));
    }
  });
  seekBar.addEventListener('change', () => {
    if (audio.duration && isFinite(audio.duration)) {
      audio.currentTime = (seekBar.value / 100) * audio.duration;
    }
    isSeeking = false;
  });
  seekBar.addEventListener('mouseup', () => { isSeeking = false; });
  seekBar.addEventListener('touchend', () => { isSeeking = false; });

  function formatTime(seconds) {
    const s = Math.floor(seconds) || 0;
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  // ── 재매칭 모달 ────────────────────────────────────────────────────────────
  let _rematchSongId = null;
  let _rematchMbid = null;   // Downloads 탭에서 mbid 기반 재매칭 시 사용
  let _selectedCandidate = null;

  // Library 탭 트랙 재매칭 (song_id 기반)
  function openRematchModal(songId, artist, title) {
    _rematchSongId = songId;
    _rematchMbid = null;
    _selectedCandidate = null;

    document.getElementById('rematch-artist').value = artist;
    document.getElementById('rematch-track').value = title;

    // 후보 목록 초기화
    const candidatesEl = document.getElementById('rematch-candidates');
    candidatesEl.innerHTML = '<div class="rematch-placeholder">아티스트와 트랙명을 입력 후 검색하세요.</div>';

    // 피드백 초기화
    const feedbackEl = document.getElementById('rematch-feedback');
    feedbackEl.textContent = '';
    feedbackEl.className = 'rematch-feedback';

    const applyBtn = document.getElementById('rematch-apply-btn');
    applyBtn.disabled = false;
    applyBtn.textContent = '적용';

    document.getElementById('rematch-modal').classList.remove('hidden');
    document.getElementById('rematch-artist').focus();
  }

  function closeRematchModal() {
    document.getElementById('rematch-modal').classList.add('hidden');
    _rematchSongId = null;
    _rematchMbid = null;
    _selectedCandidate = null;
  }

  // Downloads 탭 이력 행에서 호출 — mbid 기반 재매칭
  function openRematchModalForDownload(mbid, artist, title) {
    _rematchSongId = null;
    _rematchMbid = mbid;
    _selectedCandidate = null;

    document.getElementById('rematch-artist').value = artist;
    document.getElementById('rematch-track').value = title;

    const candidatesEl = document.getElementById('rematch-candidates');
    candidatesEl.innerHTML = '<div class="rematch-placeholder">아티스트와 트랙명을 입력 후 검색하세요.</div>';

    const feedbackEl = document.getElementById('rematch-feedback');
    feedbackEl.textContent = '';
    feedbackEl.className = 'rematch-feedback';

    const applyBtn = document.getElementById('rematch-apply-btn');
    applyBtn.disabled = false;
    applyBtn.textContent = '적용';

    document.getElementById('rematch-modal').classList.remove('hidden');
    document.getElementById('rematch-artist').focus();
  }

  async function searchRematch() {
    const artist = document.getElementById('rematch-artist').value.trim();
    const track  = document.getElementById('rematch-track').value.trim();

    if (!artist && !track) {
      setRematchFeedback('error', '아티스트 또는 트랙명을 입력하세요.');
      return;
    }

    const searchBtn = document.getElementById('rematch-search-btn');
    searchBtn.disabled = true;
    searchBtn.textContent = '검색 중...';

    _selectedCandidate = null;

    const feedbackEl = document.getElementById('rematch-feedback');
    feedbackEl.textContent = '';
    feedbackEl.className = 'rematch-feedback';

    const candidatesEl = document.getElementById('rematch-candidates');
    candidatesEl.innerHTML = '<div class="rematch-placeholder"><span class="loading-spinner"></span>검색 중...</div>';

    try {
      const params = new URLSearchParams();
      if (artist) params.set('artist', artist);
      if (track)  params.set('track', track);
      params.set('source', 'musicbrainz');

      const res = await fetch('/api/rematch/search?' + params.toString());
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || 'HTTP ' + res.status);
      }
      const data = await res.json();
      renderRematchCandidates(data.candidates);
    } catch (e) {
      candidatesEl.innerHTML = '';
      setRematchFeedback('error', '검색 실패: ' + e.message);
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = '검색';
    }
  }

  function renderRematchCandidates(candidates) {
    const candidatesEl = document.getElementById('rematch-candidates');
    candidatesEl.innerHTML = '';

    if (!candidates || !candidates.length) {
      candidatesEl.innerHTML = '<div class="rematch-placeholder">검색 결과가 없습니다.</div>';
      return;
    }

    candidates.forEach(c => {
      const card = document.createElement('div');
      card.className = 'rematch-card';

      // 커버 썸네일
      if (c.cover_url) {
        const img = document.createElement('img');
        img.className = 'rematch-thumb';
        img.alt = '';
        img.src = c.cover_url;
        img.onerror = function() {
          this.style.display = 'none';
          phDiv.style.display = 'flex';
        };
        const phDiv = document.createElement('div');
        phDiv.className = 'rematch-thumb-placeholder';
        phDiv.style.display = 'none';
        phDiv.textContent = '\u266B';
        card.appendChild(img);
        card.appendChild(phDiv);
      } else {
        const phDiv = document.createElement('div');
        phDiv.className = 'rematch-thumb-placeholder';
        phDiv.textContent = '\u266B';
        card.appendChild(phDiv);
      }

      // 정보 영역
      const info = document.createElement('div');
      info.className = 'rematch-card-info';

      const albumDiv = document.createElement('div');
      albumDiv.className = 'rematch-card-album';
      albumDiv.textContent = c.album_name || '(앨범명 없음)';
      if (c.year) {
        const yearSpan = document.createElement('span');
        yearSpan.style.color = '#718096';
        yearSpan.style.fontWeight = '400';
        yearSpan.style.fontSize = '0.78rem';
        yearSpan.textContent = ' (' + c.year + ')';
        albumDiv.appendChild(yearSpan);
      }

      const artistDiv = document.createElement('div');
      artistDiv.className = 'rematch-card-artist';
      artistDiv.textContent = c.artist_name || '';

      const badgesDiv = document.createElement('div');
      badgesDiv.className = 'rematch-card-badges';

      if (c.source) {
        const badge = document.createElement('span');
        badge.className = 'badge badge-mb badge-source';
        badge.textContent = c.source;
        badgesDiv.appendChild(badge);
      }
      if (c.mb_recording_id) {
        const recBadge = document.createElement('span');
        recBadge.className = 'badge badge-source';
        recBadge.style.background = '#2d2a54';
        recBadge.style.color = '#b794f4';
        recBadge.textContent = 'mbid: ' + c.mb_recording_id.slice(0, 8) + '...';
        badgesDiv.appendChild(recBadge);
      }

      info.appendChild(albumDiv);
      info.appendChild(artistDiv);
      info.appendChild(badgesDiv);
      card.appendChild(info);

      // 클릭 시 선택 상태 토글
      card.addEventListener('click', () => {
        document.querySelectorAll('#rematch-candidates .rematch-card').forEach(el => {
          el.classList.remove('selected');
        });
        card.classList.add('selected');
        _selectedCandidate = c;

        const feedbackEl = document.getElementById('rematch-feedback');
        feedbackEl.textContent = '';
        feedbackEl.className = 'rematch-feedback';
      });

      candidatesEl.appendChild(card);
    });
  }

  async function applyRematch() {
    if (!_selectedCandidate) {
      setRematchFeedback('error', '적용할 후보를 선택하세요.');
      return;
    }
    if (!_rematchSongId && !_rematchMbid) {
      setRematchFeedback('error', '대상 트랙 정보가 없습니다. 모달을 다시 열어주세요.');
      return;
    }

    const applyBtn = document.getElementById('rematch-apply-btn');
    applyBtn.disabled = true;
    applyBtn.textContent = '적용 중...';

    const searchBtn = document.getElementById('rematch-search-btn');
    searchBtn.disabled = true;

    try {
      // Downloads 탭(mbid 기반) vs Library 탭(song_id 기반) 분기
      const payload = {
        mb_recording_id: _selectedCandidate.mb_recording_id ?? null,
        mb_album_id:     _selectedCandidate.mb_album_id ?? null,
      };
      if (_rematchMbid) {
        payload.mbid = _rematchMbid;
      } else {
        payload.song_id = _rematchSongId;
      }

      const res = await fetch('/api/rematch/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || 'HTTP ' + res.status);
      }

      setRematchFeedback('success', '재매칭 적용 완료. 라이브러리를 새로고침합니다...');

      // 모달 닫고 현재 아티스트 다시 로드
      setTimeout(() => {
        closeRematchModal();
        if (selectedArtistId) {
          // 현재 선택된 아티스트를 다시 로드해 트랙 목록 갱신
          const activeItem = document.querySelector('.artist-item.active');
          const artistName = activeItem ? activeItem.querySelector('span')?.textContent ?? '' : '';
          // albumCache 무효화 (재매칭 후 앨범 정보가 바뀔 수 있음)
          Object.keys(albumCache).forEach(k => delete albumCache[k]);
          openAlbums.clear();
          selectArtist(selectedArtistId, artistName, activeItem ?? document.createElement('div'));
        }
      }, 1200);
    } catch (e) {
      setRematchFeedback('error', '적용 실패: ' + e.message);
      applyBtn.disabled = false;
      applyBtn.textContent = '적용';
      searchBtn.disabled = false;
    }
  }

  function setRematchFeedback(type, msg) {
    const el = document.getElementById('rematch-feedback');
    el.textContent = msg;
    el.className = 'rematch-feedback ' + (type === 'error' ? 'error' : 'success');
  }

  // 재매칭 모달 Enter 키 지원
  ['rematch-artist', 'rematch-track'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); searchRematch(); }
    });
  });

  // 재매칭 모달 외부(오버레이) 클릭 시 닫기
  document.getElementById('rematch-modal').addEventListener('click', function(e) {
    if (e.target === this) closeRematchModal();
  });
</script>
</body>
</html>
