services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    ports:
      - "4533:4533"
    volumes:
      - ./data/music:/music:ro
      - navidrome-data:/data
    environment:
      ND_SCANSCHEDULE: "0"   # disable auto-scan; brainstream triggers it
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h

  brainstream:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - db-data:/app/db
    depends_on:
      - navidrome
    environment:
      - TZ=Asia/Seoul
      - LB_USERNAME=
      - LB_TOKEN=
      - NAVIDROME_PASSWORD=
      # Optional overrides (defaults shown):
      # - NAVIDROME_USER=admin
      # - NAVIDROME_URL=http://navidrome:4533

volumes:
  db-data:
  navidrome-data:
