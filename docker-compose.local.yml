services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    volumes:
      - ./data/music:/music:ro
      - navidrome-data:/data
    environment:
      ND_SCANSCHEDULE: "0"   # disable auto-scan; brainstream triggers it
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: /navidrome

  brainstream:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - db-data:/app/db
    depends_on:
      - navidrome
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv6.conf.default.disable_ipv6: 1

volumes:
  db-data:
  navidrome-data:
